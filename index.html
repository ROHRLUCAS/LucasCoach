<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LucasCoach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>LucasCoach</h1>
      <h2>L'appli de coaching de football pour tous les niveaux</h2>
      <a href="https://www.fff.fr//" class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">

    <h2>Lucas Rohr</h2>
    <p class="subtitle">Fondateur & coach certifié de Football</p>
    <img class="avatar" src="profile.jpg" alt="Lucas Rohr">

    <h2>Nos services</h2>
    <div class="cards">

      <div class="card">
        <img src="card1.jpg" alt="Cours en ligne">
        <h3>Cours en ligne</h3>
      </div>

      <div class="card">
        <img src="card2.jpg" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>

      <div class="card">
        <img src="card3.jpg" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>

      <div class="card">
        <img src="card4.jpg" alt="Communauté">
        <h3>Communauté</h3>
      </div>

    </div>
  </div>

</body>
</html>
